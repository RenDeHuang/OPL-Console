name: deploy-tke-production

on:
  workflow_dispatch:
    inputs:
      image:
        description: "Full OPL Console image tag to build and deploy"
        required: true
      verify_workspace:
        description: "Run managed Workspace lifecycle smoke test after deploy"
        required: true
        default: "false"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json
      - run: npm --prefix apps/web ci
      - run: go test -count=1 ./...
      - run: npm --prefix apps/web run build
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ secrets.OPL_REGISTRY_HOST }}
          username: ${{ secrets.OPL_REGISTRY_USERNAME }}
          password: ${{ secrets.OPL_REGISTRY_PASSWORD }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ inputs.image }}
      - uses: azure/setup-kubectl@v4
      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          printf '%s' "${{ secrets.TKE_KUBECONFIG_B64 }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
      - name: Apply manifest
        run: |
          sed "s#registry.example.com/opl/opl-console:2026-07-04#${{ inputs.image }}#g" deploy/tke/opl-console.k8s.json | kubectl apply -f -
          kubectl -n opl-cloud rollout status deployment/opl-console --timeout=180s
      - name: Production verifier
        env:
          OPL_CONSOLE_ORIGIN: ${{ secrets.OPL_CONSOLE_ORIGIN }}
          OPL_VERIFY_WORKSPACE: ${{ inputs.verify_workspace == 'true' && '1' || '0' }}
          OPL_CONSOLE_EMAIL: ${{ secrets.OPL_CONSOLE_EMAIL }}
          OPL_CONSOLE_PASSWORD: ${{ secrets.OPL_CONSOLE_PASSWORD }}
        run: go run ./tools/production-verifier
