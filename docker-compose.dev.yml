services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: opl_console
      POSTGRES_USER: opl
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opl -d opl_console"]
      interval: 5s
      timeout: 5s
      retries: 20
